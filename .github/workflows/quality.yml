name: Site quality

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          NEXT_PUBLIC_SITE_URL: https://example.invalid
          NEXT_PUBLIC_SITE_MODE: staging
          NEXT_PUBLIC_ALLOW_INDEXING: "false"
